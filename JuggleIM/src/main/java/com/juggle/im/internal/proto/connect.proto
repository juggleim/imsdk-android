syntax = "proto3";

package app_messages;

import "appmessages.proto";

message ConnectMsgBody{
    string protoId = 1;
    string sdkVersion = 2; // SDK version
    string appkey = 3;
    string token = 4;

    // Device information
    string deviceId = 5;
    string platform = 6;//iOS/Android/iPad
    string deviceCompany = 7;// Device vendor, e.g. huawei/apple
    string deviceModel = 8;// Device model, e.g. iPhone8
    string deviceOsVersion = 9;// Mobile operating system version
    string pushToken = 10;// Vendor push token
    // Network
    string networkId = 11;// Network type; 4G/wifi
    string isp_num = 12;// Network operator ID
    string clientIp = 13;
    
    string packageName = 14;
    string pushChannel = 15;
    string ext = 16;
    string instanceId = 17;// Client instance identifier, used to distinguish different instances when multiple instances are running, clientSession
    string language = 18;// Language setting
    bool isBackend = 19;// Whether the app is in the background

    bytes secretNegotiate = 101; // Secret negotiation
}

message ConnectAckMsgBody{
    int32 code = 1;
    string userId = 2;
    string session = 3;
    int64 timestamp = 4;
    string ext = 5;

    bytes secretNegotiateAck = 101; // Secret negotiation response
}

message DisconnectMsgBody{
    int32 code = 1;
    int64 timestamp = 2;
    string ext = 3;
}

message PublishMsgBody{
    int32 index = 1;
    string topic = 2;
    string targetId = 3;
    int64 timestamp = 4;
    bytes data = 5;
}

message PublishAckMsgBody{
    int32 index = 1;
    int32 code = 2;
    string msgId = 3;
    int64 timestamp = 4;
    int64 msgSeqNo = 5;
    int32 memberCount = 6;
    string clientMsgId = 7;
    DownMsg modifiedMsg = 8;
}

message QueryMsgBody{
    int32 index = 1;
    string topic = 2;
    string targetId = 3;
    int64 timestamp = 4;
    bytes data = 5;
}

message QueryAckMsgBody{
    int32 index = 1;
    int32 code = 2;
    int64 timestamp = 3;
    bytes data = 4;
}

message QueryConfirmMsgBody{
    int32 index = 1;
}

message ImWebsocketMsg {
    int32 version = 1;
    int32 cmd = 2;
    int32 qos  = 3;
    bytes payload = 4;
    oneof testof{
        ConnectMsgBody connectMsgBody = 11;
        ConnectAckMsgBody ConnectAckMsgBody = 12;
        DisconnectMsgBody disconnectMsgBody = 13;
        PublishMsgBody publishMsgBody = 14;
        PublishAckMsgBody pubAckMsgBody = 15;
        QueryMsgBody qryMsgBody = 16;
        QueryAckMsgBody qryAckMsgBody = 17;
        QueryConfirmMsgBody qryConfirmMsgBody = 18;
    }
}
